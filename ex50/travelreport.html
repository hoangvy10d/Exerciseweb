        td {

        form {

<body>
    <h1>Travel Expense Report</h1>
    <hr style="border: 1px solid #805c21; margin: 0 0 5px;">
    <form name="travelReportForm">

            <td> 1) First Name: </td>

        </tr>

                        <select name="category" id="category" size="1" onchange="this.form.categoryOutput.value=this.value;">

                </tr>
