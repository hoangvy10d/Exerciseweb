<html>
<head>
    <title>Page Title</title>
    <style type="text/css">
        thead,tfoot {
            background-color: #335eea;
            color: #fff;
        }
        tbody tr:nth-child(2n+1) {
            background-color: whitesmoke;
        }
        tbody tr:nth-child(2n) {
            background-color: #ec76e4;
        }
        tbody tr:hover {
            background-color: #b3ff00;
            cursor: pointer;
        }
        tbody tr td:first-child {
            text-align: center;
        }
    </style>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10" style="width: 100%; margin: auto;">
        <thead style="text-align: center;">
            <tr>
                <th style="width: 5%;">#</th>
                <th style="width: 20%;">Student ID</th>
                <th style="width: 75%;">Student Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>12345</td>
                <td>Albert Einstein</td>
            </tr>
            <tr>
                <td>2</td>
                <td>321232</td>
                <td>Niels Bohr</td>
            </tr>

            <tr>
                <td>3</td>
                <td>987544</td>
                <td>Stephen Hawking</td>
            </tr>
            <tr>
                <td>4</td>
                <td>3586787 </td>
                <td>Isaac Newton</td>
            </tr>
            <tr>
                <td>5</td>
                <td>574878</td>

            </tr>
        </tbody>
        <tfoot>
            <tr >

            </tr>
        </tfoot>
</body>
</html>
